# A Deployment tells Kubernetes to run N identical pod replicas
# and replace them automatically if they crash.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  # selector tells the Deployment which pods it owns.
  # Must match the labels in the pod template below.
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          # Helm substitutes .Values.image.repository and .Values.image.tag here.
          # The CD workflow overrides image.tag with sha-<commit> on each deploy.
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Interactive demo env vars (Phase 5).
          # GITHUB_TOKEN is pulled from a Secret so the credential never lives in Git
          # or the image. The repo + guard token are non-secret config from values.yaml.
          {{- if .Values.demo.enabled }}
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.demo.secretName }}
                  key: GITHUB_TOKEN
            - name: GITHUB_REPO
              value: {{ .Values.demo.githubRepo | quote }}
            - name: DEPLOY_GUARD_TOKEN
              value: {{ .Values.demo.guardToken | quote }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.service.port }}
          # Liveness probe: Kubernetes restarts the pod if /health stops responding.
          # This is why we added GET /health in Phase 1 — it pays off here.
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
